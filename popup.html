<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UvoCorp Order Bot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="icons/icon48.png" alt="UvoCorp Bot">
        <h1>UvoCorp Order Bot</h1>
      </div>
      <div class="status">
        <div class="status-indicator"></div>
        <span id="statusText">Active</span>
      </div>
    </header>
    
    <div class="tab-container">
      <div class="tabs">
        <button class="tab-button active" data-tab="dashboard">Dashboard</button>
        <button class="tab-button" data-tab="history">History</button>
        <button class="tab-button" data-tab="settings">Settings</button>
        <button class="tab-button" data-tab="logs">Logs</button>
      </div>
      
      <div class="tab-content">
        <!-- Dashboard Tab -->
        <div id="dashboard" class="tab-pane active">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon available-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="16" x2="12" y2="12"></line>
                  <line x1="12" y1="8" x2="12" y2="8"></line>
                </svg>
              </div>
              <div class="stat-content">
                <span class="stat-label">Available</span>
                <span id="availableCount" class="stat-value">0</span>
              </div>
            </div>
            
            <div class="stat-card">
              <div class="stat-icon new-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <path d="M12 8v8"></path>
                  <path d="M8 12h8"></path>
                </svg>
              </div>
              <div class="stat-content">
                <span class="stat-label">New</span>
                <span id="newCount" class="stat-value">0</span>
              </div>
            </div>
            
            <div class="stat-card">
              <div class="stat-icon rejected-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="15" y1="9" x2="9" y2="15"></line>
                  <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
              </div>
              <div class="stat-content">
                <span class="stat-label">Rejected</span>
                <span id="rejectedCount" class="stat-value">0</span>
              </div>
            </div>
            
            <div class="stat-card">
              <div class="stat-icon taken-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                  <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
              </div>
              <div class="stat-content">
                <span class="stat-label">Taken</span>
                <span id="takenCount" class="stat-value">0</span>
              </div>
            </div>
          </div>
          
          <div class="controls">
            <button id="toggleBot" class="button primary">
              <span class="button-icon">
                <svg id="playIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polygon points="10 8 16 12 10 16 10 8"></polygon>
                </svg>
                <svg id="pauseIcon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="10" y1="15" x2="10" y2="9"></line>
                  <line x1="14" y1="15" x2="14" y2="9"></line>
                </svg>
              </span>
              <span id="toggleText">Pause Bot</span>
            </button>
            
            <button id="refreshPage" class="button secondary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"></polyline>
                <polyline points="23 20 23 14 17 14"></polyline>
                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
              </svg>
              Refresh Page
            </button>
          </div>
          
          <div class="recent-activity">
            <h3>Recent Activity</h3>
            <div id="recentLogs" class="recent-logs"></div>
          </div>
        </div>
        
        <!-- History Tab -->
        <div id="history" class="tab-pane">
          <div class="history-filter">
            <select id="historyType" class="select-dropdown">
              <option value="taken">Taken Orders</option>
              <option value="rejected">Rejected Orders</option>
              <option value="available">All Available Orders</option>
            </select>
            <button id="clearHistory" class="button danger">Clear History</button>
          </div>
          
          <div class="history-list-container">
            <div id="historyList" class="history-list"></div>
            <div id="emptyHistory" class="empty-state hidden">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12" y2="16"></line>
              </svg>
              <p>No order history found</p>
            </div>
          </div>
        </div>
        
        <!-- Settings Tab -->
        <div id="settings" class="tab-pane">
          <div class="settings-section">
            <h3>Bot Configuration</h3>
            
            <div class="setting-item">
              <label for="botEnabled">Bot Status</label>
              <label class="switch">
                <input type="checkbox" id="botEnabled" checked>
                <span class="slider round"></span>
              </label>
            </div>
            
            <div class="setting-item">
              <label for="autoRefresh">Auto-Refresh</label>
              <label class="switch">
                <input type="checkbox" id="autoRefresh" checked>
                <span class="slider round"></span>
              </label>
            </div>
            
            <div class="setting-item">
              <label for="refreshInterval">Refresh Interval (seconds)</label>
              <input type="number" id="refreshInterval" min="3" max="60" value="6" class="number-input">
            </div>
            
            <div class="setting-item">
              <label for="minDeadline">Minimum Deadline (hours)</label>
              <input type="number" id="minDeadline" min="1" max="48" value="5" class="number-input">
            </div>
          </div>
          
          <div class="settings-section">
            <h3>Accepted Languages</h3>
            <div class="language-tags" id="languageTags"></div>
            
            <div class="language-input">
              <input type="text" id="newLanguage" placeholder="Add a language..." class="text-input">
              <button id="addLanguage" class="button primary small">Add</button>
            </div>
          </div>
          
          <div class="settings-section">
            <h3>Notifications</h3>
            
            <div class="setting-item">
              <label for="soundEnabled">Sound Notifications</label>
              <label class="switch">
                <input type="checkbox" id="soundEnabled" checked>
                <span class="slider round"></span>
              </label>
            </div>
            
            <div class="setting-item">
              <label for="desktopNotifications">Desktop Notifications</label>
              <label class="switch">
                <input type="checkbox" id="desktopNotifications" checked>
                <span class="slider round"></span>
              </label>
            </div>
          </div>
          
          <div class="settings-actions">
            <button id="saveSettings" class="button primary">Save Settings</button>
            <button id="resetSettings" class="button secondary">Reset to Default</button>
          </div>
        </div>
        
        <!-- Logs Tab -->
        <div id="logs" class="tab-pane">
          <div class="logs-header">
            <h3>Bot Activity Logs</h3>
            <button id="clearLogs" class="button danger small">Clear Logs</button>
          </div>
          
          <div id="logsList" class="logs-list"></div>
        </div>
      </div>
            
      <footer>
        <div class="version">v1.0.0</div>
        <div class="links">
          <a href="#" id="reportIssue">Report Issue</a>
          <a href="#" id="helpLink">Help</a>
        </div>
      </footer>
      
      </div>
      
      <script src="popup.js"></script>
      </body>
      </html>
